<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Subtle dot grid texture -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1" fill="#21262d"/>
      <circle cx="24" cy="0" r="1" fill="#21262d"/>
      <circle cx="0" cy="24" r="1" fill="#21262d"/>
      <circle cx="24" cy="24" r="1" fill="#21262d"/>
    </pattern>
    <!-- Radial vignette overlay -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#010409" stop-opacity="0.7"/>
    </radialGradient>
    <!-- Green glow for prompt symbol -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0d1117" rx="72"/>

  <!-- Dot grid texture -->
  <rect width="512" height="512" fill="url(#dots)" rx="72" opacity="0.5"/>

  <!-- Vignette -->
  <rect width="512" height="512" fill="url(#vignette)" rx="72"/>

  <!-- Top rule with green status pip -->
  <rect x="56" y="178" width="400" height="1" fill="#21262d"/>
  <rect x="56" y="175" width="8" height="7" rx="1" fill="#3fb950"/>
  <rect x="70" y="175" width="8" height="7" rx="1" fill="#e3b341"/>
  <rect x="84" y="175" width="8" height="7" rx="1" fill="#f85149"/>

  <!-- Prompt symbol with glow -->
  <text
    x="72"
    y="294"
    font-family="'Courier New', Courier, monospace"
    font-size="104"
    font-weight="700"
    fill="#3fb950"
    filter="url(#glow)">&#x276F;</text>

  <!-- carl wordmark -->
  <text
    x="196"
    y="294"
    font-family="'Courier New', Courier, monospace"
    font-size="104"
    font-weight="700"
    fill="#e6edf3"
    letter-spacing="1">carl</text>

  <!-- Blinking cursor -->
  <rect x="442" y="230" width="14" height="68" rx="2" fill="#3fb950" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.1;0.9" dur="1.1s" repeatCount="indefinite" calcMode="discrete"/>
  </rect>

  <!-- Bottom rule -->
  <rect x="56" y="334" width="400" height="1" fill="#21262d"/>

  <!-- Tagline -->
  <text
    x="256"
    y="385"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="#3d444d"
    text-anchor="middle"
    letter-spacing="4.5">CODE REVIEW WITH LLM</text>
</svg>
